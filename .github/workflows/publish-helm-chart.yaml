name: Publish Helm Chart

on:
  workflow_call:
    inputs:
      version:
        description: Chart version (overrides Chart.yaml if set)
        required: false
        type: string
      production:
        description: Push to production registry (default dev)
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      version:
        description: Chart version (leave empty to use Chart.yaml as-is)
        required: false
        type: string
      production:
        description: Push to production registry (default dev)
        required: false
        type: boolean
        default: false

permissions: write-all

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.8.1

      - name: Set chart version
        if: inputs.version != ''
        run: |
          sed -i "s/version: 0.0.0/version: ${{ inputs.version }}/" charts/copia/Chart.yaml

      - name: Generate changelog
        run: docker run --rm --platform linux/amd64 -v "$(pwd):/data" mogensen/helm-changelog:latest

      - name: Package Helm chart
        run: helm package ./charts/copia

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: copia-*.tgz

      - name: Log in to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart
        run: helm push copia-*.tgz oci://ghcr.io/copia-automation/${{ inputs.production && 'helm-charts' || 'helm-charts-dev' }}
