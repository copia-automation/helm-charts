name: Publish Production Helm Chart to Production Container Registry

on:
  workflow_call:
    inputs:
      version:
        description: Chart version (overrides Chart.yaml if set)
        required: false
        type: string
      production:
        description: Push to production registry (default dev)
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      version:
        description: Chart version (leave empty to use Chart.yaml as-is)
        required: false
        type: string
      production:
        description: Push to production registry (default dev)
        required: false
        type: boolean
        default: false

permissions: write-all

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.8.1

      - name: Set `version` in Chart.yaml to ${{ inputs.version }}
        if: inputs.version != ''
        run: |
          sed -i "s/version: 0.0.0/version: ${{ inputs.version }}/" charts/copia/Chart.yaml
          # helm-changelog reads Chart.yaml via `git cat-file`, not the worktree,
          # so the version bump must be a real (local-only) commit to be visible.
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -am "Release copia-${{ inputs.version }}"

      - name: Generate Helm changelog
        run: docker run --rm --platform linux/amd64 --user "$(id -u):$(id -g)" -v "$(pwd):/data" mogensen/helm-changelog:latest

      - name: Package Helm chart
        run: helm package ./charts/copia

      - name: Upload chart artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-chart
          path: copia-*.tgz

      - name: Log in to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to registry
        run: helm push copia-*.tgz oci://ghcr.io/copia-automation/${{ inputs.production && 'helm-charts' || 'helm-charts-dev' }}
