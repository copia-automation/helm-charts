name: Publish Production Helm Chart to Production Container Registry

on:
  workflow_call:
    inputs:
      version:
        description: Chart version (overrides Chart.yaml if set)
        required: false
        type: string
      production:
        description: Push to production registry (default dev; GHCR only)
        required: false
        type: boolean
        default: false
      registry:
        description: 'Target OCI registry: ghcr or distr'
        required: false
        type: string
        default: ghcr
    secrets:
      DISTR_REGISTRY_PAT:
        description: Personal access token for Distr artifact registry (registry.distr.sh)
        required: false
  workflow_dispatch:
    inputs:
      version:
        description: Chart version (leave empty to use Chart.yaml as-is)
        required: false
        type: string
      production:
        description: Push to production registry (default dev; GHCR only)
        required: false
        type: boolean
        default: false
      registry:
        description: Target OCI registry (ghcr = GHCR, distr = Distr pilot)
        required: false
        type: choice
        options:
          - ghcr
          - distr
        default: ghcr

permissions: write-all

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Distr console — docker login registry.distr.sh; OCI prefix registry.distr.sh/<slug>/…
      DISTR_REGISTRY_HOST: registry.distr.sh
      DISTR_OCI_REPOSITORY: copia-test
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.8.1

      - name: Validate registry input
        env:
          REGISTRY: ${{ inputs.registry }}
        run: |
          case "$REGISTRY" in
            ghcr|distr) ;;
            *)
              echo "::error::registry must be ghcr or distr (got: ${REGISTRY})"
              exit 1
              ;;
          esac

      - name: Set `version` in Chart.yaml to ${{ inputs.version }}
        if: inputs.version != ''
        run: |
          sed -i "s/^version: .*/version: ${{ inputs.version }}/" charts/copia/Chart.yaml
          # helm-changelog reads Chart.yaml via `git cat-file`, not the worktree,
          # so the version bump must be a real (local-only) commit to be visible.
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -am "Release copia-${{ inputs.version }}"

      - name: Generate Helm changelog
        run: docker run --rm --platform linux/amd64 --user "$(id -u):$(id -g)" -v "$(pwd):/data" mogensen/helm-changelog:latest

      # Historical commits af65307 (#141) and 0f613e0 (#150) committed
      # `version: 0.0.0`, which helm-changelog surfaces as a `## 0.0.0` section
      # on every run. Strip it; match `0.0.0` exactly to avoid catching
      # `0.0.0-beta.pr<n>` from beta builds.
      - name: Strip phantom `## 0.0.0` section from Changelog.md
        run: |
          awk '
            /^## 0\.0\.0[[:space:]]*$/ { skip=1; next }
            /^## / && skip             { skip=0 }
            !skip
          ' charts/copia/Changelog.md > charts/copia/Changelog.md.tmp
          mv charts/copia/Changelog.md.tmp charts/copia/Changelog.md

      - name: Package Helm chart
        run: helm package ./charts/copia

      - name: Upload chart artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-chart-${{ inputs.registry }}
          path: copia-*.tgz

      - name: Log in to GitHub Container Registry
        if: inputs.registry == 'ghcr'
        run: echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Log in to Distr registry
        if: inputs.registry == 'distr'
        run: echo "$DISTR_REGISTRY_PAT" | helm registry login "$DISTR_REGISTRY_HOST" --username - --password-stdin
        env:
          DISTR_REGISTRY_PAT: ${{ secrets.DISTR_REGISTRY_PAT }}

      - name: Push Helm chart to GHCR
        if: inputs.registry == 'ghcr'
        run: helm push copia-*.tgz oci://ghcr.io/copia-automation/${{ inputs.production && 'helm-charts' || 'helm-charts-dev' }}

      - name: Push Helm chart to Distr
        if: inputs.registry == 'distr'
        run: helm push copia-*.tgz "oci://${DISTR_REGISTRY_HOST}/${DISTR_OCI_REPOSITORY}"
