name: Release Charts

on:
  release:
    # TODO: limit release types to just "published" once we're done testing this workflow
    # types: [published]

permissions: write-all

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      chart-version: ${{ steps.version.outputs.chart-version }}
    steps:
      - name: Extract chart version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "chart-version=${TAG#copia-}" >> $GITHUB_OUTPUT

  publish:
    needs: prepare
    uses: ./.github/workflows/publish-helm-chart.yaml
    with:
      version: ${{ needs.prepare.outputs.chart-version }}
      registry: oci://ghcr.io/copia-automation/helm-charts
