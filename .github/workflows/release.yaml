name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - 'charts/copia/**'

permissions: write-all

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if chart version changed
        id: version-check
        run: |
          CURRENT_VERSION=$(grep '^version:' charts/copia/Chart.yaml | awk '{print $2}')
          PREVIOUS_VERSION=$(git show HEAD~1:charts/copia/Chart.yaml | grep '^version:' | awk '{print $2}')
          if [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "Chart version unchanged ($CURRENT_VERSION), skipping publish"
          else
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "Chart version changed: $PREVIOUS_VERSION -> $CURRENT_VERSION"
          fi

      - name: Setup Helm
        if: steps.version-check.outputs.version_changed == 'true'
        uses: azure/setup-helm@v4
        with:
          version: v3.8.1

      - name: Package Helm chart
        if: steps.version-check.outputs.version_changed == 'true'
        run: helm package ./charts/copia

      - name: Log in to GitHub Container Registry
        if: steps.version-check.outputs.version_changed == 'true'
        run: echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to GitHub Container Registry
        if: steps.version-check.outputs.version_changed == 'true'
        run: helm push copia-*.tgz oci://ghcr.io/copia-automation/helm-charts
