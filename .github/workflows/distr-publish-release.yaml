name: Publish production release to Distr

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      chart-version: ${{ steps.version.outputs.chart-version }}
    steps:
      - id: version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          case "$TAG" in
            copia-*) echo "chart-version=${TAG#copia-}" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unexpected release tag: $TAG" >&2; exit 1 ;;
          esac

  # Stable releases ship to BOTH instances: staging (every channel) and production
  # (stable only). Edge/PR stay staging-only.
  publish-staging:
    needs: version
    uses: ./.github/workflows/distr-publish.yaml
    secrets:
      DISTR_REGISTRY_PAT: ${{ secrets.DISTR_STAGING_REGISTRY_PAT }}
      DISTR_API_TOKEN: ${{ secrets.DISTR_STAGING_API_TOKEN }}
    with:
      chart-version: ${{ needs.version.outputs.chart-version }}
      registry-host: ${{ vars.DISTR_STAGING_REGISTRY_HOST }}
      oci-namespace: ${{ vars.DISTR_STAGING_OCI_NAMESPACE }}
      api-base: ${{ vars.DISTR_STAGING_API_BASE }}
      tailscale: true

  publish-production:
    needs: version
    uses: ./.github/workflows/distr-publish.yaml
    secrets:
      DISTR_REGISTRY_PAT: ${{ secrets.DISTR_REGISTRY_PAT }}
      DISTR_API_TOKEN: ${{ secrets.DISTR_API_TOKEN }}
    with:
      chart-version: ${{ needs.version.outputs.chart-version }}
      registry-host: ${{ vars.DISTR_PROD_REGISTRY_HOST }}
      oci-namespace: ${{ vars.DISTR_PROD_OCI_NAMESPACE }}
      api-base: ${{ vars.DISTR_PROD_API_BASE }}
      tailscale: false
