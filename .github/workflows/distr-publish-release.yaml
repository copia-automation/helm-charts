name: Publish production release to Distr

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      chart-version: ${{ steps.version.outputs.chart-version }}
    steps:
      - id: version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          case "$TAG" in
            copia-*) echo "chart-version=${TAG#copia-}" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unexpected release tag: $TAG" >&2; exit 1 ;;
          esac

  publish:
    needs: version
    # Publishes to both Distr instances during rollout. Future (ENG-20123):
    # production and edge versions will live only in the prod instance; drop
    # the staging matrix leg here once that instance exists.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: cloud
            prefix: DISTR_CLOUD
            tailscale: false
          - target: staging
            prefix: DISTR_STAGING
            tailscale: true
    uses: ./.github/workflows/distr-publish.yaml
    secrets:
      DISTR_REGISTRY_PAT: ${{ matrix.target == 'cloud' && secrets.DISTR_REGISTRY_PAT || secrets.DISTR_STAGING_REGISTRY_PAT }}
      DISTR_API_TOKEN: ${{ matrix.target == 'cloud' && secrets.DISTR_API_TOKEN || secrets.DISTR_STAGING_API_TOKEN }}
    with:
      chart-version: ${{ needs.version.outputs.chart-version }}
      registry-host: ${{ vars[format('{0}_REGISTRY_HOST', matrix.prefix)] }}
      oci-namespace: ${{ vars[format('{0}_OCI_NAMESPACE', matrix.prefix)] }}
      api-base: ${{ vars[format('{0}_API_BASE', matrix.prefix)] }}
      chart-name: copia
      tailscale: ${{ matrix.tailscale }}
