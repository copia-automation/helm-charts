name: Publish Production Helm Chart to Container Registry

on:
  release:
    types: [published]

permissions: write-all

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      chart-version: ${{ steps.version.outputs.chart-version }}
    steps:
      - name: Extract chart version from release tag ${{ github.event.release.tag_name }}
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "chart-version=${TAG#copia-}" >> $GITHUB_OUTPUT

  publish:
    needs: prepare
    uses: ./.github/workflows/publish-helm-chart.yaml
    with:
      version: ${{ needs.prepare.outputs.chart-version }}
      production: true

  # Production channel (ADR-ENG-19207): the same release also publishes the chart
  # to Distr and mirrors the images it references. ADR-ENG-19206 then creates an
  # ApplicationVersion in the `copia` application from this chart.
  publish-distr:
    needs: prepare
    uses: ./.github/workflows/publish-helm-chart.yaml
    secrets: inherit
    with:
      version: ${{ needs.prepare.outputs.chart-version }}
      registry: distr

  mirror-images:
    needs: prepare
    uses: ./.github/workflows/mirror-containers-to-distr.yaml
    secrets: inherit
