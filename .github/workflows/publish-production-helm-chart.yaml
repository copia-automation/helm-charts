name: Publish Production Helm Chart to Container Registry

on:
  release:
    # TODO: limit to types: published when done testing
    # types: [published]

permissions: write-all

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      chart-version: ${{ steps.version.outputs.chart-version }}
    steps:
      - name: Extract chart version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "chart-version=${TAG#copia-}" >> $GITHUB_OUTPUT

  publish:
    needs: prepare
    uses: ./.github/workflows/publish-helm-chart.yaml
    with:
      version: ${{ needs.prepare.outputs.chart-version }}
      # TODO: set production: true when done testing
      # production: true
      production: false
